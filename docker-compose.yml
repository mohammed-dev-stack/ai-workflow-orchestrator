version: '3.8'

services:
  # ==========================================
  #  قاعدة البيانات MongoDB
  # ==========================================
  mongodb:
    image: mongo:7
    container_name: ai-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ai-orchestrator
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-network

  # ==========================================
  #  Redis (لـ BullMQ)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ai-network

  # ==========================================
  #  الخادم الخلفي (Backend)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev   # استخدم Dockerfile للإنتاج إن أردت
    container_name: ai-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      # استخدام أسماء الحاويات بدلاً من localhost
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/ai-orchestrator?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}  # يؤخذ من ملف .env
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
      - redis
    volumes:
      # ربط المجلد المحلي لتحديث الكود مباشرة (للتطوير)
      - ./backend:/app
      - /app/node_modules   # منع الكتابة فوق node_modules داخل الحاوية
    networks:
      - ai-network

  # ==========================================
  #  الواجهة الأمامية (Frontend)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev   # استخدم Dockerfile للإنتاج إن أردت
    container_name: ai-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api  # الـ API عبر الـ Host
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ai-network

# ==========================================
#  الشبكات والـ Volumes
# ==========================================
networks:
  ai-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local